services:
  postgres:
    image: ${POSTGRES_IMAGE}
    profiles:
      - legacy-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    image: ${MAILPIT_IMAGE}
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  n8n:
    image: ${N8N_IMAGE}
    restart: unless-stopped
    depends_on:
      mailpit:
        condition: service_started
    ports:
      - "${N8N_PORT}:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: ${N8N_DB_HOST}
      DB_POSTGRESDB_PORT: ${N8N_DB_PORT}
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL}
      N8N_DIAGNOSTICS_ENABLED: ${N8N_DIAGNOSTICS_ENABLED}
      N8N_PERSONALIZATION_ENABLED: ${N8N_PERSONALIZATION_ENABLED}
      N8N_TEMPLATES_ENABLED: ${N8N_TEMPLATES_ENABLED}
      N8N_DEFAULT_LOCALE: ${N8N_DEFAULT_LOCALE}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      TZ: ${TZ}
      EXECUTIONS_DATA_PRUNE: ${EXECUTIONS_DATA_PRUNE}
      EXECUTIONS_DATA_MAX_AGE: ${EXECUTIONS_DATA_MAX_AGE}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: ${N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: ${N8N_BLOCK_ENV_ACCESS_IN_NODE}
      RESPONSIBLE_EMAIL: ${RESPONSIBLE_EMAIL}
      SMTP_FROM: ${SMTP_FROM}
      MATCH_THRESHOLD: ${MATCH_THRESHOLD}
      OCDS_MAX_SEARCH_TERMS: ${OCDS_MAX_SEARCH_TERMS}
      SERCOP_RECENT_WINDOW_DAYS: ${SERCOP_RECENT_WINDOW_DAYS}
      INVITED_COMPANY_NAME: ${INVITED_COMPANY_NAME}
      INVITED_COMPANY_RUC: ${INVITED_COMPANY_RUC}
      OCDS_YEAR: ${OCDS_YEAR}
      POLL_MINUTES: ${POLL_MINUTES}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/import/workflows:ro
      - ./config:/workspace/config:ro
      - ./knowledge:/workspace/knowledge
      - ./backups:/workspace/backups

  edge-gateway:
    image: nutriweb-1-nginx:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
    volumes:
      - ./config/edge-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    profiles:
      - public-edge

  crm-ngrok:
    image: ${NGROK_IMAGE}
    restart: unless-stopped
    command:
      - "http"
      - "--authtoken=${NGROK_AUTHTOKEN}"
      - "--log=stdout"
      - "--log-format=json"
      - "--domain=${CRM_NGROK_DOMAIN}"
      - "host.docker.internal:${CRM_EXTERNAL_TARGET_PORT:-5050}"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
      CRM_NGROK_DOMAIN: ${CRM_NGROK_DOMAIN}
      CRM_EXTERNAL_TARGET_PORT: ${CRM_EXTERNAL_TARGET_PORT}
    ports:
      - "4041:4040"
    profiles:
      - crm-ngrok

volumes:
  postgres_data:
  n8n_data:
